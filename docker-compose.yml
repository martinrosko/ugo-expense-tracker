services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ugo
      POSTGRES_PASSWORD: ugo_dev
      POSTGRES_DB: ugo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugo"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    # start-dev uses H2 for embedded storage by default; we override to postgres
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      # Uses the ugo database with a dedicated 'keycloak' schema
      KC_DB_URL: jdbc:postgresql://postgres:5432/ugo
      KC_DB_USERNAME: ugo
      KC_DB_PASSWORD: ugo_dev
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://ugo:ugo_dev@postgres:5432/ugo
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/ugo
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
